<style>
:root {
  --sand-50: #faf8f5;
  --sand-100: #f3efe8;
  --sand-200: #e8e0d4;
  --sand-300: #d4c8b5;
  --sand-400: #b5a48a;
  --sand-500: #978567;
  --sand-600: #7a6b52;
  --sand-700: #5e523f;
  --sand-800: #443b2d;
  --sand-900: #2c261d;
  --win-green: #2d8f4e;
  --loss-red: #c44;
  --accent-gold: #c49a3c;
  --accent-blue: #3a6ea5;
  --bg: var(--sand-50);
  --card: #fff;
  --text: var(--sand-900);
  --text-secondary: var(--sand-600);
  --border: var(--sand-200);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Source Sans 3', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.container { max-width: 960px; margin: 0 auto; padding: 0 16px; }

/* HEADER */
header {
  background: var(--sand-900);
  color: var(--sand-100);
  padding: 20px 0 16px;
  border-bottom: 3px solid var(--accent-gold);
}
header .container { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 8px; }
.logo { font-family: 'DM Serif Display', serif; font-size: 28px; letter-spacing: 0.5px; color: #fff; }
.logo span { color: var(--accent-gold); }
.version-badge {
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
  background: var(--accent-gold); color: var(--sand-900); padding: 3px 10px; border-radius: 3px;
  vertical-align: middle; margin-left: 8px;
}
.header-meta { font-size: 13px; color: var(--sand-400); }

/* NAV TABS */
nav {
  background: var(--sand-800);
  border-bottom: 1px solid var(--sand-700);
  overflow-x: auto; white-space: nowrap;
  -webkit-overflow-scrolling: touch;
}
nav::-webkit-scrollbar { display: none; }
nav .container { display: flex; gap: 0; }
.tab-btn {
  padding: 12px 20px; border: none; background: none; color: var(--sand-400);
  font-family: 'Source Sans 3', sans-serif; font-size: 13px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.2px; cursor: pointer;
  border-bottom: 2px solid transparent; transition: all 0.2s;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--sand-200); }
.tab-btn.active { color: var(--accent-gold); border-bottom-color: var(--accent-gold); }

/* MAIN CONTENT */
main { padding: 24px 0 60px; }

.section-title {
  font-family: 'DM Serif Display', serif;
  font-size: 22px; margin-bottom: 16px;
}

/* GAME CARDS */
.games-grid { display: flex; flex-direction: column; gap: 12px; }

.game-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  transition: box-shadow 0.2s;
}
.game-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }

.game-card-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 16px;
  background: var(--sand-100);
  border-bottom: 1px solid var(--border);
  font-size: 12px; color: var(--text-secondary); font-weight: 600;
}

.game-card-body { padding: 16px; }

.matchup-row {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 16px;
}

.team-side { display: flex; flex-direction: column; gap: 4px; }
.team-side.away { text-align: left; }
.team-side.home { text-align: right; }

.team-name { font-weight: 900; font-size: 18px; line-height: 1.1; }
.team-record { font-size: 12px; color: var(--text-secondary); font-weight: 600; }

.vs-block { text-align: center; min-width: 100px; }
.vs-text { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }

.prob-bar-container { margin: 8px 0; height: 8px; border-radius: 4px; background: var(--sand-200); overflow: hidden; display: flex; }
.prob-bar-away { height: 100%; background: var(--accent-blue); transition: width 0.5s; border-radius: 4px 0 0 4px; }
.prob-bar-home { height: 100%; background: var(--accent-gold); transition: width 0.5s; border-radius: 0 4px 4px 0; }

.prob-labels { display: flex; justify-content: space-between; font-size: 13px; font-weight: 700; }
.prob-away { color: var(--accent-blue); }
.prob-home { color: var(--accent-gold); }

.prediction-footer {
  margin-top: 12px; padding-top: 12px;
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 8px;
}

.pred-score {
  font-family: 'DM Serif Display', serif;
  font-size: 16px;
}

.confidence-badge {
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
  padding: 3px 10px; border-radius: 3px;
}
.confidence-high { background: #e8f5e9; color: var(--win-green); }
.confidence-med { background: #fff8e1; color: #b8860b; }
.confidence-low { background: var(--sand-100); color: var(--sand-600); }

.pick-tag {
  font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 4px;
}
.pick-tag.away { background: rgba(58,110,165,0.1); color: var(--accent-blue); }
.pick-tag.home { background: rgba(196,154,60,0.1); color: var(--accent-gold); }

/* FACTOR BREAKDOWN */
.factor-toggle {
  font-size: 12px; color: var(--accent-blue); cursor: pointer;
  background: none; border: none; font-weight: 700; padding: 0;
  font-family: inherit;
}
.factor-toggle:hover { text-decoration: underline; }

.factor-breakdown {
  margin-top: 12px; padding: 12px;
  background: var(--sand-50);
  border-radius: 6px; border: 1px solid var(--border);
  font-size: 12px;
}
.factor-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 4px 0;
}
.factor-row + .factor-row { border-top: 1px solid var(--sand-200); }
.factor-name { color: var(--text-secondary); font-weight: 600; }
.factor-value { font-weight: 700; }
.factor-value.favor-away { color: var(--accent-blue); }
.factor-value.favor-home { color: var(--accent-gold); }

/* POWER RANKINGS TABLE */
.rankings-table {
  width: 100%; border-collapse: collapse;
  background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  overflow: hidden;
}
.rankings-table th {
  background: var(--sand-800); color: var(--sand-100);
  padding: 10px 12px; text-align: left;
  font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700;
}
.rankings-table td {
  padding: 10px 12px; border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.rankings-table tr:last-child td { border-bottom: none; }
.rankings-table tr:hover td { background: var(--sand-50); }
.rank-num { font-weight: 900; font-size: 15px; color: var(--accent-gold); width: 40px; }
.team-cell { font-weight: 700; }
.elo-val { font-family: 'DM Serif Display', serif; font-size: 15px; }
.net-rtg { font-weight: 700; }
.net-rtg.positive { color: var(--win-green); }
.net-rtg.negative { color: var(--loss-red); }

/* METHODOLOGY SECTION */
.method-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px; margin-top: 16px;
}
.method-card h3 {
  font-family: 'DM Serif Display', serif;
  font-size: 18px; margin-bottom: 12px;
}
.method-card p { font-size: 14px; line-height: 1.7; color: var(--text-secondary); margin-bottom: 12px; }
.method-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px; margin-top: 16px;
}
.method-item {
  background: var(--sand-50);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px;
}
.method-item-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); font-weight: 700; margin-bottom: 4px; }
.method-item-value { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--accent-gold); }
.method-item-desc { font-size: 12px; color: var(--text-secondary); margin-top: 4px; line-height: 1.5; }

/* OVER/UNDER */
.ou-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  padding: 16px; margin-bottom: 12px;
}
.ou-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.ou-teams { font-weight: 700; font-size: 15px; }
.ou-total { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--accent-gold); }
.ou-bar { height: 6px; border-radius: 3px; background: var(--sand-200); margin: 8px 0; overflow: hidden; }
.ou-bar-fill { height: 100%; border-radius: 3px; }
.ou-over { background: var(--win-green); }
.ou-under { background: var(--loss-red); }
.ou-label { font-size: 12px; color: var(--text-secondary); }

/* TRACK RECORD */
.track-summary {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.track-stat {
  background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  padding: 16px; text-align: center;
}
.track-stat-value { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--accent-gold); }
.track-stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); font-weight: 700; margin-top: 4px; }

.track-log {
  background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
}
.track-log-header {
  padding: 12px 16px; background: var(--sand-100); border-bottom: 1px solid var(--border);
  font-size: 12px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px;
}
.track-log-empty { padding: 40px; text-align: center; color: var(--text-secondary); font-size: 14px; }

/* EMPTY STATE */
.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--text-secondary);
}
.empty-state-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
.empty-state-title { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--text); margin-bottom: 8px; }
.empty-state-text { font-size: 14px; line-height: 1.6; max-width: 400px; margin: 0 auto; }

/* LOADING */
.loading { text-align: center; padding: 60px 20px; }
.loading-spinner {
  width: 36px; height: 36px; border: 3px solid var(--sand-200);
  border-top-color: var(--accent-gold); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(--text-secondary); }

/* FOOTER */
footer {
  padding: 20px 0; text-align: center;
  font-size: 12px; color: var(--text-secondary);
  border-top: 1px solid var(--border);
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .logo { font-size: 22px; }
  .tab-btn { padding: 10px 14px; font-size: 11px; }
  .matchup-row { grid-template-columns: 1fr auto 1fr; gap: 8px; }
  .team-name { font-size: 15px; }
  .vs-block { min-width: 70px; }
  .method-grid { grid-template-columns: 1fr 1fr; }
}
</style>

// ─── V3 PREDICTION ENGINE ─────────────────────────────────────

const ENGINE = {
  // Weights from research (sum to 1.0)
  WEIGHTS: {
    elo: 0.35,
    netRating: 0.25,
    fourFactors: 0.15,
    momentum: 0.10,
    homeCourt: 0.08,
    rest: 0.05,
    pythagorean: 0.02,
  },

  HOME_ELO_BONUS: 70, // Reduced from 100 due to declining HCA
  ELO_TO_SPREAD: 28, // Elo points per projected point

  // Elo win probability
  eloWinProb(eloA, eloB) {
    return 1 / (1 + Math.pow(10, (eloB - eloA) / 400));
  },

  // Net Rating win probability (logistic)
  netRatingWinProb(nrA, nrB) {
    const diff = nrA - nrB;
    return 1 / (1 + Math.pow(10, -diff / 10));
  },

  // Four Factors comparison — returns 0 to 1 probability
  fourFactorsProb(teamA, teamB) {
    // eFG% difference (most important)
    const efgDiff = (teamA.efg - teamB.efg) * 100; // in percentage points
    // Turnover rate (lower is better, so invert)
    const tovDiff = (teamB.tov - teamA.tov) * 100;
    // Offensive rebound rate
    const orebDiff = (teamA.oreb - teamB.oreb) * 100;
    // Free throw rate
    const ftDiff = (teamA.ftRate - teamB.ftRate) * 100;

    // Weighted composite: eFG 40%, TOV 25%, OREB 20%, FT 15%
    const composite = efgDiff * 0.40 + tovDiff * 0.25 + orebDiff * 0.20 + ftDiff * 0.15;
    return 1 / (1 + Math.pow(10, -composite / 3));
  },

  // Momentum score from last 10 and streak
  momentumProb(teamA, teamB) {
    function parseLast10(str) {
      const parts = str.split("-");
      return parseInt(parts[0]) / 10;
    }
    function parseStreak(str) {
      const type = str[0]; // W or L
      const count = parseInt(str.substring(1));
      const val = Math.log(count + 1) / Math.log(11); // log decay, max ~1 at 10
      return type === "W" ? 0.5 + val * 0.2 : 0.5 - val * 0.2;
    }
    const momA = parseLast10(teamA.last10) * 0.6 + parseStreak(teamA.streak) * 0.4;
    const momB = parseLast10(teamB.last10) * 0.6 + parseStreak(teamB.streak) * 0.4;
    const diff = momA - momB;
    return 1 / (1 + Math.pow(10, -diff * 5));
  },

  // Pythagorean expected win%
  pythagoreanWinPct(team) {
    const exp = 14.3; // FiveThirtyEight NBA exponent
    return Math.pow(team.ppg, exp) / (Math.pow(team.ppg, exp) + Math.pow(team.papg, exp));
  },

  // Home court probability adjustment
  homeCourtProb() {
    // +70 Elo ≈ 60% win probability for the home team vs equal opponent
    return this.eloWinProb(1500 + this.HOME_ELO_BONUS, 1500);
  },

  // Rest adjustment (returns point adjustment)
  restAdjustment(isB2B, isHome) {
    if (!isB2B) return 0;
    return isHome ? -1.0 : -2.0; // Research: -2 away B2B, -1 home B2B
  },

  // MAIN PREDICTION FUNCTION
  predict(awayKey, homeKey, awayB2B = false, homeB2B = false) {
    const away = TEAMS[awayKey];
    const home = TEAMS[homeKey];
    if (!away || !home) return null;

    const W = this.WEIGHTS;

    // 1. Elo (with home court bonus)
    const eloProb = this.eloWinProb(away.elo, home.elo + this.HOME_ELO_BONUS);
    const homeEloProb = 1 - eloProb;

    // 2. Net Rating
    const nrProb = this.netRatingWinProb(away.netRtg, home.netRtg);
    const homeNrProb = 1 - nrProb;

    // 3. Four Factors
    const ffProb = this.fourFactorsProb(away, home);
    const homeFFProb = 1 - ffProb;

    // 4. Momentum
    const momProb = this.momentumProb(away, home);
    const homeMomProb = 1 - momProb;

    // 5. Home Court (constant bias toward home)
    const hcProb = 1 - this.homeCourtProb(); // away perspective
    const homeHCProb = this.homeCourtProb();

    // 6. Pythagorean
    const pythA = this.pythagoreanWinPct(away);
    const pythH = this.pythagoreanWinPct(home);
    const pythProb = pythA / (pythA + pythH);
    const homePythProb = 1 - pythProb;

    // 7. Rest (convert to probability nudge)
    const restAdj = this.restAdjustment(awayB2B, false) - this.restAdjustment(homeB2B, true);
    const restProb = 1 / (1 + Math.pow(10, -restAdj / 5));
    const homeRestProb = 1 - restProb;

    // Composite away win probability
    const awayWinProb =
      W.elo * eloProb +
      W.netRating * nrProb +
      W.fourFactors * ffProb +
      W.momentum * momProb +
      W.homeCourt * hcProb +
      W.rest * restProb +
      W.pythagorean * pythProb;

    const homeWinProb = 1 - awayWinProb;

    // Projected spread (Elo-based + rest adjustment)
    const eloDiff = home.elo + this.HOME_ELO_BONUS - away.elo;
    let spread = eloDiff / this.ELO_TO_SPREAD;
    spread += this.restAdjustment(homeB2B, true) - this.restAdjustment(awayB2B, false);

    // Projected scores
    const avgTotal = (away.ppg + away.papg + home.ppg + home.papg) / 4;
    const paceAdj = (away.pace + home.pace) / 2 / 100;
    const projTotal = avgTotal * paceAdj;
    const homeScore = Math.round((projTotal / 2) + (spread / 2));
    const awayScore = Math.round((projTotal / 2) - (spread / 2));

    // Confidence level
    const probDiff = Math.abs(homeWinProb - 0.5);
    let confidence = "LOW";
    if (probDiff > 0.18) confidence = "HIGH";
    else if (probDiff > 0.10) confidence = "MED";

    return {
      awayKey, homeKey,
      awayWinProb: Math.round(awayWinProb * 1000) / 10,
      homeWinProb: Math.round(homeWinProb * 1000) / 10,
      spread: Math.round(spread * 10) / 10,
      projAwayScore: Math.max(85, awayScore),
      projHomeScore: Math.max(85, homeScore),
      projTotal: Math.round(projTotal * 10) / 10,
      confidence,
      pick: homeWinProb > awayWinProb ? homeKey : awayKey,
      factors: {
        elo: { away: Math.round(eloProb * 100), home: Math.round(homeEloProb * 100) },
        netRating: { away: Math.round(nrProb * 100), home: Math.round(homeNrProb * 100) },
        fourFactors: { away: Math.round(ffProb * 100), home: Math.round(homeFFProb * 100) },
        momentum: { away: Math.round(momProb * 100), home: Math.round(homeMomProb * 100) },
        homeCourt: { away: Math.round(hcProb * 100), home: Math.round(homeHCProb * 100) },
        pythagorean: { away: Math.round(pythProb * 100), home: Math.round(homePythProb * 100) },
      },
    };
  },
};


// ─── SCOREBOARD FETCH ─────────────────────────────────────────

async function fetchTodaysGames() {
  const today = new Date();
  const dateStr = today.toISOString().slice(0, 10).replace(/-/g, "");

  // Try local API proxy first (your Vercel api/scores.js), then CDN fallback
  const urls = [
    `/api/scores`,
    `https://cdn.nba.com/static/json/liveData/scoreboard/todaysScoreboard_00.json`,
  ];

  for (const url of urls) {
    try {
      const resp = await fetch(url);
      if (!resp.ok) continue;
      const data = await resp.json();

      if (data.scoreboard && data.scoreboard.games) {
        return data.scoreboard.games.map(g => ({
          id: g.gameId,
          status: g.gameStatusText || g.gameStatus,
          statusNum: g.gameStatus, // 1=not started, 2=live, 3=final
          time: g.gameTimeUTC,
          away: {
            abbrev: g.awayTeam.teamTricode,
            score: g.awayTeam.score,
          },
          home: {
            abbrev: g.homeTeam.teamTricode,
            score: g.homeTeam.score,
          },
        }));
      }
    } catch (e) {
      console.log("Scoreboard fetch failed:", e);
    }
  }

  // Fallback: return hardcoded sample games for today
  return getFallbackGames();
}

        <p>
          Our composite approach blends the most proven methodologies: FiveThirtyEight-style 
          Elo ratings with margin-of-victory K-factor, net rating analysis, Dean Oliver's Four 
          Factors comparison, momentum signals, Pythagorean expected win%, home court 
          advantage (adjusted for its recent decline), and rest/back-to-back fatigue modeling.
        </p>

        <div className="method-grid">
          <div className="method-item">
            <div className="method-item-label">Elo Rating</div>
            <div className="method-item-value">35%</div>
            <div className="method-item-desc">
              FiveThirtyEight-style Elo with MOV K-factor. K = 20 × (MOV+3)^0.8 / (7.5 + 0.006 × elo_diff). 
              Alone gets ~65-67% accuracy.
            </div>
          </div>
          <div className="method-item">
            <div className="method-item-label">Net Rating</div>
            <div className="method-item-value">25%</div>
            <div className="method-item-desc">
              Offensive Rating minus Defensive Rating per 100 possessions. 
              Single strongest team quality indicator in regression studies.
            </div>
          </div>
          <div className="method-item">
            <div className="method-item-label">Four Factors</div>
            <div className="method-item-value">15%</div>
            <div className="method-item-desc">
              eFG% (40%), Turnover Rate (25%), OREB% (20%), FT Rate (15%). 
              Head-to-head Four Factors comparison captures matchup dynamics.
            </div>
          </div>
          <div className="method-item">
            <div className="method-item-label">Momentum</div>
            <div className="method-item-value">10%</div>
            <div className="method-item-desc">
              Last-10 record + win/loss streak with logarithmic decay. 
              SHAP analysis identifies momentum as a top-5 predictor.
            </div>
          </div>
          <div className="method-item">
            <div className="method-item-label">Home Court</div>
            <div className="method-item-value">8%</div>
            <div className="method-item-desc">
              +70 Elo points (≈ +2.5 projected points). Reduced from historical +100 
              as HCA has declined from 60% to ~54% in recent seasons.
            </div>
          </div>
          <div className="method-item">
            <div className="method-item-label">Rest / B2B</div>
            <div className="method-item-value">5%</div>
            <div className="method-item-desc">
              Back-to-back penalty: -2.0 pts away, -1.0 pts home. 
              B2B teams win ~43% vs ~52% for rested teams.
            </div>
          </div>
          <div className="method-item">
            <div className="method-item-label">Pythagorean</div>
            <div className="method-item-value">2%</div>
            <div className="method-item-desc">
              Win% = PtsFor^14.3 / (PtsFor^14.3 + PtsAgainst^14.3). 
              Sanity check — overlaps heavily with Net Rating.
            </div>
          </div>
          <div className="method-item">
            <div className="method-item-label">Spread Formula</div>
            <div className="method-item-value">÷ 28</div>
            <div className="method-item-desc">
              (Home Elo + 70 - Away Elo) / 28 = projected spread. 
              Adjusted for rest differentials. Scores projected from pace + efficiency.
            </div>
          </div>
        </div>
      </div>

      <div className="method-card">
        <h3>Data Sources & Limitations</h3>
        <p>
          Team statistics are embedded snapshots that need periodic updates. Live scores come 
          from the NBA's CDN scoreboard. The model does not currently account for individual 
          player injuries/rest — a major limitation that real-money models address through 
          player-level projections (RAPTOR, EPM, etc.) or by blending with Vegas lines.
        </p>
        <p>
          Future enhancements: Vegas odds comparison (requires ODDS_API_KEY in Vercel), 
          automated stat refreshes, player props modeling, and accuracy tracking that 
          validates predictions against actual results over time.
        </p>
      </div>
    </div>
  );
}
