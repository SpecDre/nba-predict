<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Source+Sans+3:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --sand-50: #faf8f5;
  --sand-100: #f3efe8;
  --sand-200: #e8e0d4;
  --sand-300: #d4c8b5;
  --sand-400: #b5a48a;
  --sand-500: #978567;
  --sand-600: #7a6b52;
  --sand-700: #5e523f;
  --sand-800: #443b2d;
  --sand-900: #2c261d;
  --win-green: #2d8f4e;
  --loss-red: #c44;
  --accent-gold: #c49a3c;
  --accent-blue: #3a6ea5;
  --bg: var(--sand-50);
  --card: #fff;
  --text: var(--sand-900);
  --text-secondary: var(--sand-600);
  --border: var(--sand-200);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Source Sans 3', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.container { max-width: 960px; margin: 0 auto; padding: 0 16px; }

/* HEADER */
header {
  background: var(--sand-900);
  color: var(--sand-100);
  padding: 20px 0 16px;
  border-bottom: 3px solid var(--accent-gold);
}
header .container { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 8px; }
.logo { font-family: 'DM Serif Display', serif; font-size: 28px; letter-spacing: 0.5px; color: #fff; }
.logo span { color: var(--accent-gold); }
.version-badge {
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
  background: var(--accent-gold); color: var(--sand-900); padding: 3px 10px; border-radius: 3px;
  vertical-align: middle; margin-left: 8px;
}
.header-meta { font-size: 13px; color: var(--sand-400); }

/* NAV TABS */
nav {
  background: var(--sand-800);
  border-bottom: 1px solid var(--sand-700);
  overflow-x: auto; white-space: nowrap;
  -webkit-overflow-scrolling: touch;
}
nav::-webkit-scrollbar { display: none; }
nav .container { display: flex; gap: 0; }
.tab-btn {
  padding: 12px 20px; border: none; background: none; color: var(--sand-400);
  font-family: 'Source Sans 3', sans-serif; font-size: 13px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.2px; cursor: pointer;
  border-bottom: 2px solid transparent; transition: all 0.2s;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--sand-200); }
.tab-btn.active { color: var(--accent-gold); border-bottom-color: var(--accent-gold); }

/* MAIN CONTENT */
main { padding: 24px 0 60px; }

.section-title {
  font-family: 'DM Serif Display', serif;
  font-size: 22px; margin-bottom: 16px;
}

/* GAME CARDS */
.games-grid { display: flex; flex-direction: column; gap: 12px; }

.game-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  transition: box-shadow 0.2s;
}
.game-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }

.game-card-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 16px;
  background: var(--sand-100);
  border-bottom: 1px solid var(--border);
  font-size: 12px; color: var(--text-secondary); font-weight: 600;
}

.game-card-body { padding: 16px; }

.matchup-row {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 16px;
}

.team-side { display: flex; flex-direction: column; gap: 4px; }
.team-side.away { text-align: left; }
.team-side.home { text-align: right; }

.team-name { font-weight: 900; font-size: 18px; line-height: 1.1; }
.team-record { font-size: 12px; color: var(--text-secondary); font-weight: 600; }

.vs-block { text-align: center; min-width: 100px; }
.vs-text { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }

.prob-bar-container { margin: 8px 0; height: 8px; border-radius: 4px; background: var(--sand-200); overflow: hidden; display: flex; }
.prob-bar-away { height: 100%; background: var(--accent-blue); transition: width 0.5s; border-radius: 4px 0 0 4px; }
.prob-bar-home { height: 100%; background: var(--accent-gold); transition: width 0.5s; border-radius: 0 4px 4px 0; }

.prob-labels { display: flex; justify-content: space-between; font-size: 13px; font-weight: 700; }
.prob-away { color: var(--accent-blue); }
.prob-home { color: var(--accent-gold); }

.prediction-footer {
  margin-top: 12px; padding-top: 12px;
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 8px;
}

.pred-score {
  font-family: 'DM Serif Display', serif;
  font-size: 16px;
}

.confidence-badge {
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
  padding: 3px 10px; border-radius: 3px;
}
.confidence-high { background: #e8f5e9; color: var(--win-green); }
.confidence-med { background: #fff8e1; color: #b8860b; }
.confidence-low { background: var(--sand-100); color: var(--sand-600); }
.confidence-toss-up { background: #fce4ec; color: #c44; }

.pick-tag {
  font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 4px;
}
.pick-tag.away { background: rgba(58,110,165,0.1); color: var(--accent-blue); }
.pick-tag.home { background: rgba(196,154,60,0.1); color: var(--accent-gold); }

/* FACTOR BREAKDOWN */
.factor-toggle {
  font-size: 12px; color: var(--accent-blue); cursor: pointer;
  background: none; border: none; font-weight: 700; padding: 0;
  font-family: inherit;
}
.factor-toggle:hover { text-decoration: underline; }

.factor-breakdown {
  margin-top: 12px; padding: 12px;
  background: var(--sand-50);
  border-radius: 6px; border: 1px solid var(--border);
  font-size: 12px;
}
.factor-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 4px 0;
}
.factor-row + .factor-row { border-top: 1px solid var(--sand-200); }
.factor-name { color: var(--text-secondary); font-weight: 600; }
.factor-value { font-weight: 700; }
.factor-value.favor-away { color: var(--accent-blue); }
.factor-value.favor-home { color: var(--accent-gold); }

/* POWER RANKINGS TABLE */
.rankings-table {
  width: 100%; border-collapse: collapse;
  background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  overflow: hidden;
}
.rankings-table th {
  background: var(--sand-800); color: var(--sand-100);
  padding: 10px 12px; text-align: left;
  font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700;
}
.rankings-table td {
  padding: 10px 12px; border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.rankings-table tr:last-child td { border-bottom: none; }
.rankings-table tr:hover td { background: var(--sand-50); }
.rank-num { font-weight: 900; font-size: 15px; color: var(--accent-gold); width: 40px; }
.team-cell { font-weight: 700; }
.elo-val { font-family: 'DM Serif Display', serif; font-size: 15px; }
.net-rtg { font-weight: 700; }
.net-rtg.positive { color: var(--win-green); }
.net-rtg.negative { color: var(--loss-red); }

/* METHODOLOGY SECTION */
.method-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px; margin-top: 16px;
}
.method-card h3 {
  font-family: 'DM Serif Display', serif;
  font-size: 18px; margin-bottom: 12px;
}
.method-card p { font-size: 14px; line-height: 1.7; color: var(--text-secondary); margin-bottom: 12px; }
.method-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px; margin-top: 16px;
}
.method-item {
  background: var(--sand-50);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px;
}
.method-item-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); font-weight: 700; margin-bottom: 4px; }
.method-item-value { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--accent-gold); }
.method-item-desc { font-size: 12px; color: var(--text-secondary); margin-top: 4px; line-height: 1.5; }

/* OVER/UNDER */
.ou-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  padding: 16px; margin-bottom: 12px;
}
.ou-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.ou-teams { font-weight: 700; font-size: 15px; }
.ou-total { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--accent-gold); }
.ou-bar { height: 6px; border-radius: 3px; background: var(--sand-200); margin: 8px 0; overflow: hidden; }
.ou-bar-fill { height: 100%; border-radius: 3px; }
.ou-over { background: var(--win-green); }
.ou-under { background: var(--loss-red); }
.ou-label { font-size: 12px; color: var(--text-secondary); }

/* TRACK RECORD */
.track-summary {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.track-stat {
  background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  padding: 16px; text-align: center;
}
.track-stat-value { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--accent-gold); }
.track-stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); font-weight: 700; margin-top: 4px; }

.track-log {
  background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
}
.track-log-header {
  padding: 12px 16px; background: var(--sand-100); border-bottom: 1px solid var(--border);
  font-size: 12px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px;
}
.track-log-empty { padding: 40px; text-align: center; color: var(--text-secondary); font-size: 14px; }

/* EMPTY STATE */
.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--text-secondary);
}
.empty-state-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
.empty-state-title { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--text); margin-bottom: 8px; }
.empty-state-text { font-size: 14px; line-height: 1.6; max-width: 400px; margin: 0 auto; }

/* LOADING */
.loading { text-align: center; padding: 60px 20px; }
.loading-spinner {
  width: 36px; height: 36px; border: 3px solid var(--sand-200);
  border-top-color: var(--accent-gold); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(--text-secondary); }

/* FOOTER */
footer {
  padding: 20px 0; text-align: center;
  font-size: 12px; color: var(--text-secondary);
  border-top: 1px solid var(--border);
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .logo { font-size: 22px; }
  .tab-btn { padding: 10px 14px; font-size: 11px; }
  .matchup-row { grid-template-columns: 1fr auto 1fr; gap: 8px; }
  .team-name { font-size: 15px; }
  .vs-block { min-width: 70px; }
  .method-grid { grid-template-columns: 1fr 1fr; }
  .track-summary { grid-template-columns: 1fr 1fr; }
  .tier-grid { grid-template-columns: 1fr 1fr !important; }
}

// ─── V3 PREDICTION ENGINE ─────────────────────────────────────

const ENGINE = {
  // Weights from research (sum to 1.0)
  WEIGHTS: {
    elo: 0.35,
    netRating: 0.25,
    fourFactors: 0.15,
    momentum: 0.10,
    homeCourt: 0.08,
    rest: 0.05,
    pythagorean: 0.02,
  },

  HOME_ELO_BONUS: 70, // Reduced from 100 due to declining HCA
  ELO_TO_SPREAD: 28, // Elo points per projected point

  // Elo win probability
  eloWinProb(eloA, eloB) {
    return 1 / (1 + Math.pow(10, (eloB - eloA) / 400));
  },

  // Net Rating win probability (logistic)
  netRatingWinProb(nrA, nrB) {
    const diff = nrA - nrB;
    return 1 / (1 + Math.pow(10, -diff / 10));
  },

  // Four Factors comparison — returns 0 to 1 probability
  // Falls back to 0.5 (neutral) if Four Factors data not available (efg=0)
  fourFactorsProb(teamA, teamB) {
    if (teamA.efg === 0 || teamB.efg === 0) return 0.5; // no data, neutral
    const efgDiff = (teamA.efg - teamB.efg) * 100;
    const tovDiff = (teamB.tov - teamA.tov) * 100;
    const orebDiff = (teamA.oreb - teamB.oreb) * 100;
    const ftDiff = (teamA.ftRate - teamB.ftRate) * 100;
    const composite = efgDiff * 0.40 + tovDiff * 0.25 + orebDiff * 0.20 + ftDiff * 0.15;
    return 1 / (1 + Math.pow(10, -composite / 3));
  },

  // Momentum score from last 10 and streak
  momentumProb(teamA, teamB) {
    function parseLast10(str) {
      const parts = str.split("-");
      return parseInt(parts[0]) / 10;
    }
    function parseStreak(str) {
      const type = str[0];
      const count = parseInt(str.substring(1));
      const val = Math.log(count + 1) / Math.log(11);
      return type === "W" ? 0.5 + val * 0.2 : 0.5 - val * 0.2;
    }
    const momA = parseLast10(teamA.last10) * 0.6 + parseStreak(teamA.streak) * 0.4;
    const momB = parseLast10(teamB.last10) * 0.6 + parseStreak(teamB.streak) * 0.4;
    const diff = momA - momB;
    return 1 / (1 + Math.pow(10, -diff * 5));
  },

  // Pythagorean expected win%
  pythagoreanWinPct(team) {
    const exp = 14.3;
    return Math.pow(team.ppg, exp) / (Math.pow(team.ppg, exp) + Math.pow(team.papg, exp));
  },

  // TEAM-SPECIFIC home court probability (uses actual home win%)
  teamHomeCourtProb(homeTeam) {
    const homeGames = homeTeam.homeW + homeTeam.homeL;
    if (homeGames === 0) return 0.54; // league average fallback
    const rawHomeWinPct = homeTeam.homeW / homeGames;
    // Blend with league avg (0.54) to avoid overfitting small samples
    // Weight: 70% team-specific, 30% league average
    return rawHomeWinPct * 0.7 + 0.54 * 0.3;
  },

  // Away team road penalty (uses actual away win%)
  teamAwayPenalty(awayTeam) {
    const awayGames = awayTeam.awayW + awayTeam.awayL;
    if (awayGames === 0) return 0.46;
    const rawAwayWinPct = awayTeam.awayW / awayGames;
    return rawAwayWinPct * 0.7 + 0.46 * 0.3;
  },

  // Rest adjustment (returns point adjustment)
  restAdjustment(isB2B, isHome) {
    if (!isB2B) return 0;
    return isHome ? -1.0 : -2.0;
  },

  // Injury impact estimation (points adjustment)
  injuryImpact(injuries) {
    if (!injuries || injuries.length === 0) return 0;
    let totalImpact = 0;
    injuries.forEach(inj => {
      // Star players (top usage) = bigger impact
      if (inj.status === "Out" || inj.status === "O") {
        totalImpact -= (inj.impact || 3); // default 3 pts for unknown players
      } else if (inj.status === "Doubtful" || inj.status === "D") {
        totalImpact -= (inj.impact || 3) * 0.75;
      } else if (inj.status === "Questionable" || inj.status === "Q") {
        totalImpact -= (inj.impact || 3) * 0.3;
      }
    });
    return totalImpact;
  },

  // MAIN PREDICTION FUNCTION
  predict(awayKey, homeKey, awayB2B = false, homeB2B = false, awayInjuries = [], homeInjuries = []) {
    const away = TEAMS[awayKey];
    const home = TEAMS[homeKey];
    if (!away || !home) return null;

    const W = this.WEIGHTS;

    // 1. Elo (with team-specific home court bonus)
    const homeHCA = this.teamHomeCourtProb(home);
    const homeEloBonus = Math.round((homeHCA - 0.5) * 400); // convert win% advantage to Elo points
    const eloProb = this.eloWinProb(away.elo, home.elo + homeEloBonus);
    const homeEloProb = 1 - eloProb;

    // 2. Net Rating
    const nrProb = this.netRatingWinProb(away.netRtg, home.netRtg);
    const homeNrProb = 1 - nrProb;

    // 3. Four Factors
    const ffProb = this.fourFactorsProb(away, home);
    const homeFFProb = 1 - ffProb;

    // 4. Momentum
    const momProb = this.momentumProb(away, home);
    const homeMomProb = 1 - momProb;

    // 5. Home Court (team-specific)
    const hcProb = 1 - homeHCA;
    const homeHCProb = homeHCA;

    // 6. Pythagorean
    const pythA = this.pythagoreanWinPct(away);
    const pythH = this.pythagoreanWinPct(home);
    const pythProb = pythA / (pythA + pythH);
    const homePythProb = 1 - pythProb;

    // 7. Rest (convert to probability nudge)
    const restAdj = this.restAdjustment(awayB2B, false) - this.restAdjustment(homeB2B, true);
    const restProb = 1 / (1 + Math.pow(10, -restAdj / 5));
    const homeRestProb = 1 - restProb;

    // Composite away win probability
    let awayWinProb =
      W.elo * eloProb +
      W.netRating * nrProb +
      W.fourFactors * ffProb +
      W.momentum * momProb +
      W.homeCourt * hcProb +
      W.rest * restProb +
      W.pythagorean * pythProb;

    let homeWinProb = 1 - awayWinProb;

    // Projected spread (Elo-based + rest + injuries)
    const eloDiff = home.elo + homeEloBonus - away.elo;
    let spread = eloDiff / this.ELO_TO_SPREAD;
    spread += this.restAdjustment(homeB2B, true) - this.restAdjustment(awayB2B, false);

    // Apply injury adjustments to spread
    const awayInjImpact = this.injuryImpact(awayInjuries);
    const homeInjImpact = this.injuryImpact(homeInjuries);
    spread += (homeInjImpact - awayInjImpact); // negative injury = worse for that team
    // Nudge win probability based on injury spread change
    const injSpreadShift = homeInjImpact - awayInjImpact;
    if (Math.abs(injSpreadShift) > 0) {
      const injProbShift = injSpreadShift / 28 * 0.15; // ~0.5% per point of injury impact
      awayWinProb = Math.max(0.05, Math.min(0.95, awayWinProb - injProbShift));
      homeWinProb = 1 - awayWinProb;
    }

    // ── SCORE PROJECTIONS (with variance scaling) ──
    const avgTotal = (away.ppg + home.papg + home.ppg + away.papg) / 2;
    const paceAdj = (away.pace + home.pace) / 200;
    const projTotal = avgTotal * paceAdj;

    // Scale the spread's effect on individual scores by confidence
    // HIGH confidence games → stretch scores apart (blowout potential)
    // LOW confidence → compress toward even split
    const winnerProb = Math.max(homeWinProb, awayWinProb);
    const confidenceMultiplier = winnerProb > 0.65 ? 1.3 : winnerProb > 0.55 ? 1.0 : 0.7;
    const scaledSpread = spread * confidenceMultiplier;

    const homeScore = Math.round((projTotal / 2) + (scaledSpread / 2));
    const awayScore = Math.round((projTotal / 2) - (scaledSpread / 2));

    // ── CONFIDENCE LEVELS (with TOSS-UP tier) ──
    const probDiff = Math.abs(homeWinProb - 0.5);
    let confidence = "TOSS-UP";
    if (probDiff > 0.18) confidence = "HIGH";
    else if (probDiff > 0.10) confidence = "MED";
    else if (probDiff > 0.05) confidence = "LOW";
    // Under 5% from 50/50 = TOSS-UP

    return {
      awayKey, homeKey,
      awayWinProb: Math.round(awayWinProb * 1000) / 10,
      homeWinProb: Math.round(homeWinProb * 1000) / 10,
      spread: Math.round(spread * 10) / 10,
      projAwayScore: awayScore,
      projHomeScore: homeScore,
      projTotal: Math.round(projTotal * 10) / 10,
      confidence,
      pick: homeWinProb > awayWinProb ? homeKey : awayKey,
      isTossUp: confidence === "TOSS-UP",
      awayInjuries,
      homeInjuries,
      factors: {
        elo: { away: Math.round(eloProb * 100), home: Math.round(homeEloProb * 100) },
        netRating: { away: Math.round(nrProb * 100), home: Math.round(homeNrProb * 100) },
        fourFactors: { away: Math.round(ffProb * 100), home: Math.round(homeFFProb * 100) },
        momentum: { away: Math.round(momProb * 100), home: Math.round(homeMomProb * 100) },
        homeCourt: { away: Math.round(hcProb * 100), home: Math.round(homeHCProb * 100) },
        pythagorean: { away: Math.round(pythProb * 100), home: Math.round(homePythProb * 100) },
      },
    };
  },
};

async function fetchTodaysGames() {
  const today = new Date();
  const dateStr = today.toISOString().slice(0, 10).replace(/-/g, "");

  // Use our Vercel API proxy which handles all the NBA endpoint retries server-side
  // CDN calls from the browser get CORS blocked, so everything goes through /api/scores
  try {
    const resp = await fetch(`/api/scores`);
    if (resp.ok) {
      const data = await resp.json();

      if (data.scoreboard && data.scoreboard.games && data.scoreboard.games.length > 0) {
        return data.scoreboard.games.map(g => ({
          id: g.gameId,
          status: g.gameStatusText || String(g.gameStatus),
          statusNum: typeof g.gameStatus === 'number' ? g.gameStatus :
            (String(g.gameStatusText || '').includes('Final') ? 3 :
             String(g.gameStatusText || '').match(/^\d/) ? 2 : 1),
          time: g.gameTimeUTC,
          away: {
            abbrev: g.awayTeam.teamTricode,
            score: g.awayTeam.score || 0,
          },
          home: {
            abbrev: g.homeTeam.teamTricode,
            score: g.homeTeam.score || 0,
          },
        }));
      }
    }
  } catch (e) {
    console.log("Scoreboard fetch failed:", e);
  }

  // Fallback: return hardcoded sample games for today
  return getFallbackGames();
}

// Convert ET time strings to Pacific
function convertToPacific(statusText) {
  if (!statusText || typeof statusText !== 'string') return statusText;
  // If already PT, return as-is
  if (statusText.includes('PT') || statusText.includes('Pacific')) return statusText;
  // If it's a live game status like "Q2 5:30" or "Final" or "Halftime", don't convert
  if (!statusText.includes('ET') && !statusText.includes('EST') && !statusText.includes('EDT')) return statusText;

  // Extract time from strings like "7:00 PM ET" or "10:30 PM EST"
  const match = statusText.match(/(\d{1,2}):(\d{2})\s*(AM|PM)\s*(ET|EST|EDT)/i);
  if (!match) return statusText;

  let hours = parseInt(match[1]);
  const mins = match[2];
  const ampm = match[3].toUpperCase();

  // Convert to 24hr
  if (ampm === 'PM' && hours !== 12) hours += 12;
  if (ampm === 'AM' && hours === 12) hours = 0;

  // Subtract 3 hours for ET → PT
  hours -= 3;
  if (hours < 0) hours += 24;

  // Back to 12hr
  const newAmpm = hours >= 12 ? 'PM' : 'AM';
  const displayHours = hours > 12 ? hours - 12 : (hours === 0 ? 12 : hours);

  return `${displayHours}:${mins} ${newAmpm} PT`;
}

// Map tricode to our keys (handle special cases)
function mapTricode(tri) {
  const map = { CHA: "CHO", GS: "GSW", SA: "SAS", NY: "NYK", NO: "NOP", PHO: "PHX" };
  return map[tri] || tri;
}


// ─── LIVE STATS REFRESH ───────────────────────────────────────

async function fetchLiveStats() {
  try {
    const resp = await fetch('/api/stats');
    if (!resp.ok) throw new Error('Stats API failed');
    const data = await resp.json();
    if (!data.success || !data.teams || data.teams.length === 0) throw new Error('No team data');

    // Merge fresh stats into the embedded TEAMS object
    let updated = 0;
    data.teams.forEach(t => {
      if (TEAMS[t.key]) {
        TEAMS[t.key].w = t.w;
        TEAMS[t.key].l = t.l;
        TEAMS[t.key].homeW = t.homeW;
        TEAMS[t.key].homeL = t.homeL;
        TEAMS[t.key].awayW = t.awayW;
        TEAMS[t.key].awayL = t.awayL;
        TEAMS[t.key].elo = t.elo;
        TEAMS[t.key].netRtg = t.netRtg;
        TEAMS[t.key].offRtg = t.offRtg;
        TEAMS[t.key].defRtg = t.defRtg;
        TEAMS[t.key].pace = t.pace;
        TEAMS[t.key].ppg = t.ppg;
        TEAMS[t.key].papg = t.papg;
        TEAMS[t.key].streak = t.streak;
        TEAMS[t.key].last10 = t.last10;
        updated++;
      }
    });

    console.log(`[NBA Predict] Live stats updated: ${updated} teams from NBAstuffer`);
    return { success: true, updated, timestamp: data.updated };
  } catch (e) {
    console.log('[NBA Predict] Live stats unavailable, using embedded data:', e.message);
    return { success: false };
  }
}

    Promise.all([
      fetchLiveStats(),
      fetchTodaysGames().catch(() => getFallbackGames()),
    ]).then(([statsResult, gamesList]) => {
      if (statsResult.success) setDataSource("live");
      setGames(gamesList);
      setLoading(false);
    });

    // Auto-refresh scores every 30 seconds for live games
    const interval = setInterval(() => {
      fetchTodaysGames().then(g => {
        if (g && g.length > 0) setGames(g);
      }).catch(() => {});
    }, 30000);
    return () => clearInterval(interval);

    const homeB2B = g.home.b2b || g.homeB2B || false;
    return { game: g, pred: ENGINE.predict(awayKey, homeKey, awayB2B, homeB2B) };

        </div>

        <div className="container">
          {[
            ["games", "Today's Games"],
            ["rankings", "Power Rankings"],
            ["overunder", "Over/Under"],
            ["track", "Track Record"],
            ["method", "Methodology"],
          ].map(([key, label]) => (
            <button key={key} className={`tab-btn ${tab === key ? "active" : ""}`} onClick={() => setTab(key)}>
              {label}

      </nav>

}


function GameCard({ game, pred, isExpanded, onToggle }) {
  const away = TEAMS[pred.awayKey];
  const home = TEAMS[pred.homeKey];
  if (!away || !home) return null;

  const isLive = game.statusNum === 2;
  const isFinal = game.statusNum === 3;

  return (
    <div className="game-card">
      <div className="game-card-header">
        <span>{isLive ? "🔴 LIVE" : isFinal ? "FINAL" : convertToPacific(game.status)}</span>
        <span className={`confidence-badge confidence-${pred.confidence.toLowerCase()}`}>
          {pred.confidence} CONFIDENCE
        </span>
      </div>

      <div className="game-card-body">
        <div className="matchup-row">
          <div className="team-side away">
            <div className="team-name">{away.city} {away.name}</div>
            <div className="team-record">{away.w}-{away.l} • {away.streak}</div>
            {(isLive || isFinal) && <div className="team-name" style={{ fontSize: 24, marginTop: 4 }}>{game.away.score}</div>}
          </div>

          <div className="vs-block">
            <div className="vs-text">{isFinal ? "Final" : isLive ? "Live" : "vs"}</div>

// ─── TRACK RECORD SYSTEM ──────────────────────────────────────

const TRACKER = {
  STORAGE_KEY: 'nba_predict_v3_track',

  // Load all tracked data from localStorage
  load() {
    try {
      const raw = localStorage.getItem(this.STORAGE_KEY);
      return raw ? JSON.parse(raw) : { predictions: {}, results: [] };
    } catch { return { predictions: {}, results: [] }; }
  },

  save(data) {
    try { localStorage.setItem(this.STORAGE_KEY, JSON.stringify(data)); } catch {}
  },

  // Save today's predictions (called once when games load)
  savePredictions(predictions) {
    const data = this.load();
    predictions.forEach(({ game, pred }) => {
      if (!pred || !game.id) return;
      const key = `${game.id}`;
      // Don't overwrite if already saved
      if (data.predictions[key]) return;
      data.predictions[key] = {
        gameId: game.id,
        date: new Date().toISOString().slice(0, 10),
        awayKey: pred.awayKey,
        homeKey: pred.homeKey,
        awayTeam: TEAMS[pred.awayKey]?.city + ' ' + TEAMS[pred.awayKey]?.name,
        homeTeam: TEAMS[pred.homeKey]?.city + ' ' + TEAMS[pred.homeKey]?.name,
        pick: pred.pick,
        pickName: TEAMS[pred.pick]?.city + ' ' + TEAMS[pred.pick]?.name,
        awayWinProb: pred.awayWinProb,
        homeWinProb: pred.homeWinProb,
        projAwayScore: pred.projAwayScore,
        projHomeScore: pred.projHomeScore,
        spread: pred.spread,
        confidence: pred.confidence,
        isTossUp: pred.isTossUp || false,
        scored: false,
      };
    });
    this.save(data);
  },

  // Check for completed games and score predictions
  scoreCompletedGames(games) {
    const data = this.load();
    let newResults = 0;

    games.forEach(game => {
      const key = `${game.id}`;
      const pred = data.predictions[key];
      if (!pred || pred.scored) return;

      // Only score Final games
      const isFinal = game.statusNum === 3 ||
        (typeof game.status === 'string' && game.status.includes('Final'));
      if (!isFinal) return;

      const awayScore = parseInt(game.away.score) || 0;
      const homeScore = parseInt(game.home.score) || 0;
      if (awayScore === 0 && homeScore === 0) return; // No score data

      const actualWinner = homeScore > awayScore ? pred.homeKey : pred.awayKey;
      const pickCorrect = pred.pick === actualWinner;
      const actualSpread = homeScore - awayScore; // positive = home won
      const predictedSpread = pred.spread; // positive = home favored
      const spreadError = Math.abs(actualSpread - predictedSpread);
      const scoreError = Math.abs(awayScore - pred.projAwayScore) + Math.abs(homeScore - pred.projHomeScore);

      // Mark as scored
      pred.scored = true;

      // Store result
      data.results.push({
        gameId: game.id,
        date: pred.date,
        awayTeam: pred.awayTeam,
        homeTeam: pred.homeTeam,
        pickName: pred.pickName,
        pick: pred.pick,
        confidence: pred.confidence,
        isTossUp: pred.isTossUp,
        awayWinProb: pred.awayWinProb,
        homeWinProb: pred.homeWinProb,
        projAwayScore: pred.projAwayScore,
        projHomeScore: pred.projHomeScore,
        actualAwayScore: awayScore,
        actualHomeScore: homeScore,
        actualWinner,
        actualWinnerName: TEAMS[actualWinner]?.city + ' ' + TEAMS[actualWinner]?.name,
        pickCorrect,
        spreadError: Math.round(spreadError * 10) / 10,
        scoreError,
      });

      newResults++;
    });

    // Keep only last 200 results
    if (data.results.length > 200) {
      data.results = data.results.slice(-200);
    }

    this.save(data);
    return newResults;
  },

  // Compute accuracy stats from all results
  getStats() {
    const data = this.load();
    const results = data.results;
    if (results.length === 0) return null;

    const total = results.length;
    const correct = results.filter(r => r.pickCorrect).length;
    const accuracy = ((correct / total) * 100).toFixed(1);

    const spreadErrors = results.map(r => r.spreadError);
    const avgSpreadError = (spreadErrors.reduce((a, b) => a + b, 0) / total).toFixed(1);

    // High confidence games only
    const highConf = results.filter(r => r.confidence === 'HIGH');
    const highConfCorrect = highConf.filter(r => r.pickCorrect).length;
    const highConfAcc = highConf.length > 0 ? ((highConfCorrect / highConf.length) * 100).toFixed(1) : '—';

    // Toss-up games
    const tossUps = results.filter(r => r.isTossUp || r.confidence === 'TOSS-UP');
    const tossUpCorrect = tossUps.filter(r => r.pickCorrect).length;
    const tossUpAcc = tossUps.length > 0 ? ((tossUpCorrect / tossUps.length) * 100).toFixed(1) : '—';

    // By confidence tier
    const tiers = {};
    ['HIGH', 'MED', 'LOW', 'TOSS-UP'].forEach(tier => {
      const t = results.filter(r => r.confidence === tier);
      tiers[tier] = {
        total: t.length,
        correct: t.filter(r => r.pickCorrect).length,
        accuracy: t.length > 0 ? ((t.filter(r => r.pickCorrect).length / t.length) * 100).toFixed(1) : '—',
      };
    });

    // Recent results (last 30)
    const recent = results.slice(-30).reverse();

    // Streak
    let currentStreak = 0;
    let streakType = '';
    for (let i = results.length - 1; i >= 0; i--) {
      const r = results[i];
      if (i === results.length - 1) {
        streakType = r.pickCorrect ? 'W' : 'L';
        currentStreak = 1;
      } else if ((r.pickCorrect && streakType === 'W') || (!r.pickCorrect && streakType === 'L')) {
        currentStreak++;
      } else break;
    }

    return {
      total, correct, accuracy,
      avgSpreadError,
      highConfAcc, highConfTotal: highConf.length,
      tossUpAcc, tossUpTotal: tossUps.length,
      tiers,
      recent,
      streak: `${streakType}${currentStreak}`,
    };
  },

  // Reset all data
  reset() {
    localStorage.removeItem(this.STORAGE_KEY);
  },
};


function TrackRecordTab({ predictions, games }) {
  const [stats, setStats] = React.useState(null);
  const [showReset, setShowReset] = React.useState(false);

  React.useEffect(() => {
    // Save today's predictions
    if (predictions && predictions.length > 0) {
      TRACKER.savePredictions(predictions);
    }
    // Score any completed games
    if (games && games.length > 0) {
      TRACKER.scoreCompletedGames(games);
    }
    // Load stats
    setStats(TRACKER.getStats());
  }, [predictions, games]);

  const handleReset = () => {
    TRACKER.reset();
    setStats(null);
    setShowReset(false);
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <h2 className="section-title" style={{ marginBottom: 0 }}>Track Record</h2>
        <button onClick={() => setShowReset(!showReset)} style={{
          fontSize: 11, color: "var(--text-secondary)", background: "none", border: "1px solid var(--border)",
          padding: "4px 10px", borderRadius: 4, cursor: "pointer", fontFamily: "inherit"
        }}>Reset Data</button>
      </div>

      {showReset && (
        <div style={{ background: "#fff3f3", border: "1px solid #fcc", borderRadius: 6, padding: 12, marginBottom: 16, fontSize: 13 }}>
          This will erase all tracked predictions and results. Are you sure?
          <button onClick={handleReset} style={{
            marginLeft: 12, background: "var(--loss-red)", color: "#fff", border: "none",
            padding: "4px 12px", borderRadius: 4, cursor: "pointer", fontFamily: "inherit", fontWeight: 700
          }}>Yes, Reset</button>
          <button onClick={() => setShowReset(false)} style={{
            marginLeft: 8, background: "var(--sand-200)", color: "var(--text)", border: "none",
            padding: "4px 12px", borderRadius: 4, cursor: "pointer", fontFamily: "inherit"
          }}>Cancel</button>
        </div>
      )}

      <p style={{ fontSize: 14, color: "var(--text-secondary)", marginBottom: 16, lineHeight: 1.6 }}>
        v3 engine accuracy tracking. Results accumulate automatically as games complete.
        Research suggests the ceiling for NBA prediction accuracy is 68-72%.
      </p>

      {!stats ? (
        <React.Fragment>
          <div className="track-summary">
            <div className="track-stat"><div className="track-stat-value">—</div><div className="track-stat-label">Win/Loss Accuracy</div></div>
            <div className="track-stat"><div className="track-stat-value">0</div><div className="track-stat-label">Games Tracked</div></div>
            <div className="track-stat"><div className="track-stat-value">—</div><div className="track-stat-label">Avg Spread Error</div></div>
            <div className="track-stat"><div className="track-stat-value">—</div><div className="track-stat-label">High Conf Accuracy</div></div>
          </div>
          <div className="track-log">
            <div className="track-log-header">Recent Results</div>
            <div className="track-log-empty">
              Waiting for today's games to finish. Predictions are saved — once games go Final, results will appear here automatically.
            </div>
          </div>
        </React.Fragment>
      ) : (
        <React.Fragment>
          <div className="track-summary">
            <div className="track-stat">
              <div className="track-stat-value" style={{ color: parseFloat(stats.accuracy) >= 60 ? "var(--win-green)" : "var(--accent-gold)" }}>
                {stats.accuracy}%
              </div>
              <div className="track-stat-label">Win/Loss ({stats.correct}/{stats.total})</div>
            </div>
            <div className="track-stat">
              <div className="track-stat-value">{stats.total}</div>
              <div className="track-stat-label">Games Tracked</div>
            </div>
            <div className="track-stat">
              <div className="track-stat-value">{stats.avgSpreadError}</div>
              <div className="track-stat-label">Avg Spread Error</div>
            </div>
            <div className="track-stat">
              <div className="track-stat-value" style={{ color: "var(--win-green)" }}>
                {stats.highConfAcc}{stats.highConfAcc !== '—' ? '%' : ''}
              </div>
              <div className="track-stat-label">High Conf ({stats.highConfTotal}g)</div>
            </div>
          </div>

          {/* Confidence tier breakdown */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8, marginBottom: 20 }}>
            {['HIGH', 'MED', 'LOW', 'TOSS-UP'].map(tier => {
              const t = stats.tiers[tier];
              return (
                <div key={tier} style={{
                  background: "var(--card)", border: "1px solid var(--border)", borderRadius: 6,
                  padding: "8px 12px", textAlign: "center", fontSize: 12
                }}>
                  <div style={{ fontWeight: 700, color: "var(--text-secondary)", fontSize: 10, textTransform: "uppercase", letterSpacing: 1 }}>{tier}</div>
                  <div style={{ fontFamily: "'DM Serif Display', serif", fontSize: 16, marginTop: 2 }}>
                    {t.accuracy}{t.accuracy !== '—' ? '%' : ''}
                  </div>
                  <div style={{ color: "var(--text-secondary)", fontSize: 11 }}>{t.correct}/{t.total}</div>
                </div>
              );
            })}
          </div>

          {/* Recent results log */}
          <div className="track-log">
            <div className="track-log-header">Recent Results ({stats.recent.length} games) • Streak: {stats.streak}</div>
            <div style={{ maxHeight: 500, overflowY: "auto" }}>

                <div key={i} style={{
                  display: "flex", justifyContent: "space-between", alignItems: "center",
                  padding: "10px 16px", borderBottom: "1px solid var(--border)",

                }}>

                    <div style={{ fontSize: 13, fontWeight: 700 }}>
                      {r.awayTeam} {r.actualAwayScore} @ {r.homeTeam} {r.actualHomeScore}
                    </div>
                    <div style={{ fontSize: 11, color: "var(--text-secondary)", marginTop: 2 }}>

                  </div>
                  <div style={{
                    fontWeight: 900, fontSize: 14, padding: "4px 10px", borderRadius: 4, marginLeft: 8,
                    background: r.pickCorrect ? "rgba(45,143,78,0.12)" : "rgba(204,68,68,0.12)",
                    color: r.pickCorrect ? "var(--win-green)" : "var(--loss-red)"
                  }}>
                    {r.pickCorrect ? "✓ HIT" : "✗ MISS"}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </React.Fragment>
      )}
    </div>
  );
}


function MethodologyTab() {
  return (
    <div>
      <h2 className="section-title">v3 Engine Methodology</h2>

      <div className="method-card">
        <h3>Research-Backed Prediction Model</h3>
        <p>
          The v3 engine is built on peer-reviewed NBA analytics research. It combines seven 
          weighted prediction factors, calibrated based on published accuracy data. The natural 
          ceiling for NBA game prediction is 68-72% — the "upset rate" means the better team 
          loses roughly 28-32% of the time regardless of model sophistication.
        </p>
        <p>
          Our composite approach blends the most proven methodologies: FiveThirtyEight-style 
          Elo ratings with margin-of-victory K-factor, net rating analysis, Dean Oliver's Four 
          Factors comparison, momentum signals, Pythagorean expected win%, home court 
          advantage (adjusted for its recent decline), and rest/back-to-back fatigue modeling.
        </p>

        <div className="method-grid">
          <div className="method-item">
            <div className="method-item-label">Elo Rating</div>
            <div className="method-item-value">35%</div>
            <div className="method-item-desc">
              FiveThirtyEight-style Elo with MOV K-factor. K = 20 × (MOV+3)^0.8 / (7.5 + 0.006 × elo_diff). 
              Alone gets ~65-67% accuracy.
            </div>
          </div>
          <div className="method-item">
            <div className="method-item-label">Net Rating</div>
            <div className="method-item-value">25%</div>
            <div className="method-item-desc">
              Offensive Rating minus Defensive Rating per 100 possessions. 
              Single strongest team quality indicator in regression studies.
            </div>
          </div>
          <div className="method-item">
            <div className="method-item-label">Four Factors</div>
            <div className="method-item-value">15%</div>
            <div className="method-item-desc">
              eFG% (40%), Turnover Rate (25%), OREB% (20%), FT Rate (15%). 
              Head-to-head Four Factors comparison captures matchup dynamics.
            </div>
          </div>
          <div className="method-item">
            <div className="method-item-label">Momentum</div>
            <div className="method-item-value">10%</div>
            <div className="method-item-desc">
              Last-10 record + win/loss streak with logarithmic decay. 
              SHAP analysis identifies momentum as a top-5 predictor.
            </div>
          </div>
          <div className="method-item">
            <div className="method-item-label">Home Court</div>
            <div className="method-item-value">8%</div>
            <div className="method-item-desc">
              +70 Elo points (≈ +2.5 projected points). Reduced from historical +100 
              as HCA has declined from 60% to ~54% in recent seasons.
            </div>
          </div>
          <div className="method-item">
            <div className="method-item-label">Rest / B2B</div>
            <div className="method-item-value">5%</div>
            <div className="method-item-desc">
              Back-to-back penalty: -2.0 pts away, -1.0 pts home. 
              B2B teams win ~43% vs ~52% for rested teams.
            </div>
          </div>
          <div className="method-item">
            <div className="method-item-label">Pythagorean</div>
            <div className="method-item-value">2%</div>
            <div className="method-item-desc">
              Win% = PtsFor^14.3 / (PtsFor^14.3 + PtsAgainst^14.3). 
              Sanity check — overlaps heavily with Net Rating.
            </div>
          </div>
          <div className="method-item">
            <div className="method-item-label">Spread Formula</div>
            <div className="method-item-value">÷ 28</div>
            <div className="method-item-desc">
              (Home Elo + 70 - Away Elo) / 28 = projected spread. 
              Adjusted for rest differentials. Scores projected from pace + efficiency.
            </div>
          </div>
        </div>
      </div>

      <div className="method-card">
        <h3>Data Sources & Limitations</h3>
        <p>
          Team statistics are embedded snapshots that need periodic updates. Live scores come 
          from the NBA's CDN scoreboard. The model does not currently account for individual 
          player injuries/rest — a major limitation that real-money models address through 
          player-level projections (RAPTOR, EPM, etc.) or by blending with Vegas lines.
        </p>
        <p>
          Future enhancements: Vegas odds comparison (requires ODDS_API_KEY in Vercel), 
          automated stat refreshes, player props modeling, and accuracy tracking that 
          validates predictions against actual results over time.
        </p>
      </div>
    </div>
  );
}
